<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synesthesia - Mental Health Population Simulator</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <!-- Setup Screen -->
    <div id="setup-screen" class="screen active">
        <div class="setup-container">
            <div class="setup-header">
                <h1>SYNESTHESIA</h1>
                <p class="subtitle">MENTAL HEALTH POPULATION SIMULATOR</p>
            </div>
            
            <div class="setup-form">
                <div class="form-group">
                    <label>SOCIETY DESCRIPTION</label>
                    <input type="text" id="society-input" placeholder="Tech startup city, Medieval village, Space station..." />
                </div>
                
                <div class="form-group">
                    <label>POPULATION SIZE</label>
                    <input type="number" id="population-input" value="100" min="10" max="200" />
                </div>
                
                <div class="preset-grid">
                    <button class="preset-btn" onclick="setPreset('Tech startup with burnout culture')">TECH STARTUP</button>
                    <button class="preset-btn" onclick="setPreset('Small rural town with tight-knit community')">SMALL TOWN</button>
                    <button class="preset-btn" onclick="setPreset('University campus during finals week')">UNIVERSITY</button>
                </div>
                
                <button id="generate-btn" class="primary-btn" onclick="generateSimulation()">
                    INITIALIZE SIMULATION
                </button>
            </div>
        </div>
    </div>
    
    <!-- Loading Screen -->
    <div id="loading-screen" class="screen">
        <div class="loading-container">
            <div class="loader"></div>
            <h2 id="loading-message">GENERATING SOCIETY</h2>
            <p id="loading-detail">This may take 30-60 seconds</p>
        </div>
    </div>
    
    <!-- Simulation Screen -->
    <div id="simulation-screen" class="screen">
        <!-- Header Bar -->
        <div class="header-bar">
            <div class="header-left">
                <div class="logo">SYNESTHESIA</div>
                <div class="sim-time" id="sim-time">--:--</div>
            </div>
            <div class="header-right">
                <button id="pause-btn" onclick="togglePause()">PAUSE</button>
                <button onclick="toggleOracle()">ORACLE</button>
                <button onclick="stopSimulation()">STOP</button>
            </div>
        </div>
        
        <!-- Stats Dashboard -->
        <div class="stats-dashboard">
            <div class="stat-card thriving">
                <div class="stat-value" id="stat-thriving">0</div>
                <div class="stat-label">THRIVING</div>
            </div>
            <div class="stat-card coping">
                <div class="stat-value" id="stat-coping">0</div>
                <div class="stat-label">COPING</div>
            </div>
            <div class="stat-card struggling">
                <div class="stat-value" id="stat-struggling">0</div>
                <div class="stat-label">STRUGGLING</div>
            </div>
            <div class="stat-card crisis">
                <div class="stat-value" id="stat-crisis">0</div>
                <div class="stat-label">CRISIS</div>
            </div>
        </div>
        
        <!-- Main Viewport -->
        <div class="viewport">
            <canvas id="simulation-canvas"></canvas>
            
            <!-- Event Injection Overlay -->
            <div class="event-overlay">
                <input type="text" id="event-input" placeholder="INJECT EVENT..." />
                <button onclick="injectEvent()" class="inject-btn">INJECT</button>
                <div id="event-feedback" class="event-feedback"></div>
            </div>
            
            <!-- Agent Details Panel -->
            <div id="agent-panel" class="agent-panel" style="display: none;">
                <div class="panel-header">
                    <span>AGENT DETAILS</span>
                    <button onclick="closeAgentPanel()">×</button>
                </div>
                <div id="agent-info" class="panel-content"></div>
            </div>
        </div>
        
        <!-- Oracle AI Sidebar -->
        <div id="oracle-sidebar" class="oracle-sidebar">
            <div class="oracle-header">
                <span>ORACLE AI</span>
                <button onclick="toggleOracle()">×</button>
            </div>
            
            <div class="oracle-content">
                <div class="query-grid">
                    <button class="query-btn" onclick="askOracle('Who is most at risk right now?')">MOST AT RISK</button>
                    <button class="query-btn" onclick="askOracle('What are the main mental health trends?')">TRENDS</button>
                    <button class="query-btn" onclick="askOracle('Which roles are most stressed?')">ROLE ANALYSIS</button>
                    <button class="query-btn" onclick="askOracle('What interventions would help?')">INTERVENTIONS</button>
                </div>
                
                <div class="custom-query">
                    <input type="text" id="oracle-input" placeholder="ASK CUSTOM QUESTION..." />
                    <button onclick="askCustomQuery()">ASK</button>
                </div>
                
                <div id="oracle-response" class="oracle-response" style="display: none;">
                    <div class="oracle-loading" id="oracle-loading" style="display: none;">
                        <div class="spinner"></div>
                        <p>ANALYZING...</p>
                    </div>
                    <div id="oracle-answer"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/static/js/app.js"></script>
</body>
</html>
